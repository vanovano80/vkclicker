<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Мем Кликер 67</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Шапка с балансом -->
        <div class="header">
            <div class="balance-display">
                <span class="coin-icon">💎</span>
                <span id="balance">0</span>
            </div>
            <button class="ad-btn" id="doubleBtn">
                <span>🎬</span> x2 за рекламу
            </button>
        </div>

        <!-- Прогресс-бар умножения -->
        <div class="multiplier-bar">
            <div class="multiplier-fill" id="multiplierFill"></div>
            <span class="multiplier-text">x<span id="multiplierValue">1</span></span>
        </div>

        <!-- Главная игровая зона -->
        <div class="game-area">
            <div class="meme-character" id="character">67</div>
            <div class="score-popup" id="scorePopup">+0</div>
        </div>

        <!-- Зоны касания -->
        <div class="touch-zones">
            <div class="touch-zone left" id="leftZone">
                <div class="finger-icon">👆</div>
                <span>⬆️⬇️</span>
            </div>
            <div class="touch-zone right" id="rightZone">
                <div class="finger-icon">👆</div>
                <span>⬆️⬇️</span>
            </div>
        </div>

        <!-- Зона прокачки -->
        <div class="upgrade-panel" id="upgradePanel">
            <div class="upgrade-header">⬆️ ПРОКАЧКА</div>
            
            <div class="upgrade-item" id="powerUpgrade">
                <div class="upgrade-info">
                    <span class="upgrade-name">💪 Мощь клика</span>
                    <span class="upgrade-level">Уровень: <span id="powerLevel">1</span></span>
                </div>
                <button class="upgrade-btn" id="powerBtn">
                    <span id="powerCost">100</span> 💎
                </button>
            </div>

            <div class="upgrade-item" id="autoUpgrade">
                <div class="upgrade-info">
                    <span class="upgrade-name">🤖 Авто-клик</span>
                    <span class="upgrade-level">Уровень: <span id="autoLevel">0</span></span>
                </div>
                <button class="upgrade-btn" id="autoBtn">
                    <span id="autoCost">500</span> 💎
                </button>
            </div>

            <div class="upgrade-item" id="multiplierUpgrade">
                <div class="upgrade-info">
                    <span class="upgrade-name">🔥 Множитель</span>
                    <span class="upgrade-level">Уровень: <span id="multiLevel">1</span></span>
                </div>
                <button class="upgrade-btn" id="multiBtn">
                    <span id="multiCost">1000</span> 💎
                </button>
            </div>
        </div>

        <!-- Кнопка прокачки (бургер) -->
        <button class="toggle-upgrades" id="toggleUpgrades">⚙️</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
