<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мем Кликер 67</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Загрузка -->
        <div class="loading-screen" id="loadingScreen">
            <div class="loader"></div>
            <p>Загрузка...</p>
        </div>
        
        <!-- Игра -->
        <div class="game-content">
            <!-- Баланс -->
            <div class="top-bar">
                <div class="balance">
                    <span class="coin">💎</span>
                    <span id="balance">0</span>
                </div>
                <button class="ad-btn" id="adBtn">🎬 x2</button>
            </div>
            
            <!-- Персонаж -->
            <div class="character-area">
                <div class="character" id="character">67</div>
                <div class="score-float" id="scoreFloat">+0</div>
            </div>
            
            <!-- Прогресс -->
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="multiplier-badge">x<span id="multiplier">1</span></span>
            </div>
            
            <!-- Зоны -->
            <div class="touch-container">
                <div class="touch-zone" id="leftZone">
                    <div class="finger">👆</div>
                    <div class="arrows">⬆️⬇️</div>
                </div>
                <div class="touch-zone" id="rightZone">
                    <div class="finger">👆</div>
                    <div class="arrows">⬆️⬇️</div>
                </div>
            </div>
            
            <!-- Меню -->
            <button class="menu-btn" id="menuBtn">⚙️</button>
        </div>
        
        <!-- Панель прокачки -->
        <div class="upgrade-panel" id="upgradePanel">
            <div class="panel-header">
                <span>⬆️ ПРОКАЧКА</span>
                <button class="close-btn" id="closePanel">✕</button>
            </div>
            
            <div class="upgrade-card">
                <span class="upgrade-icon">💪</span>
                <div class="upgrade-info">
                    <div class="upgrade-name">Мощь клика</div>
                    <div class="upgrade-level">Ур. <span id="powerLvl">1</span></div>
                </div>
                <button class="buy-btn" id="powerBtn"><span id="powerPrice">100</span> 💎</button>
            </div>
            
            <div class="upgrade-card">
                <span class="upgrade-icon">🤖</span>
                <div class="upgrade-info">
                    <div class="upgrade-name">Авто-клик</div>
                    <div class="upgrade-level">Ур. <span id="autoLvl">0</span></div>
                </div>
                <button class="buy-btn" id="autoBtn"><span id="autoPrice">500</span> 💎</button>
            </div>
            
            <div class="upgrade-card">
                <span class="upgrade-icon">🔥</span>
                <div class="upgrade-info">
                    <div class="upgrade-name">Множитель</div>
                    <div class="upgrade-level">Ур. <span id="multiLvl">1</span></div>
                </div>
                <button class="buy-btn" id="multiBtn"><span id="multiPrice">1000</span> 💎</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
